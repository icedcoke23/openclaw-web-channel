version: "3.8"

services:
  openclaw-web:
    build: .
    container_name: openclaw-web-channel
    ports:
      - "3000:3000"
    environment:
      - OPENCLAW_GATEWAY_URL=ws://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - PORT=3000
      - MAX_WS_CONNECTIONS=100
      - STREAM_TIMEOUT=120000
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    networks:
      - openclaw-net

  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: openclaw-gateway
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/root/.openclaw
    restart: unless-stopped
    networks:
      - openclaw-net

volumes:
  openclaw-data:

networks:
  openclaw-net:
    driver: bridge
